name: Fetch news

on:
  schedule:
    # JST 01:00 / 07:00 / 13:00 / 19:00
    - cron: "0 16 * * *"
    - cron: "0 22 * * *"
    - cron: "0 4 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-news
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cron/requirements.txt

      - name: Install Python dependencies
        run: pip install -r cron/requirements.txt

      - name: Fetch RSS and update KV
        id: fetch
        run: python3 cron/main.py
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}

      - name: Revalidate Vercel cache
        if: success()
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$REVALIDATE_SECRET" ]; then
            echo "REVALIDATE_SECRET not set — skipping revalidate"
            exit 0
          fi
          base="${SITE_URL:-https://g7-dashboard.vercel.app}"
          curl -sf -X POST "${base}/api/revalidate?secret=${REVALIDATE_SECRET}"

  notify-failure:
    runs-on: ubuntu-latest
    needs: fetch
    if: failure()
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          payload=$(jq -n \
            --arg content "❌ World Front Page cron failed" \
            --arg run "$RUN_URL" \
            --arg repo "${{ github.repository }}" \
            --arg ref "${{ github.ref_name }}" \
            '{
              content: $content,
              embeds: [{
                title: "Fetch news workflow failed",
                color: 15158332,
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Branch", value: $ref, inline: true },
                  { name: "Run", value: $run, inline: false }
                ]
              }]
            }')
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          payload=$(jq -n \
            --arg text "❌ World Front Page cron failed — ${{ github.repository }}@${{ github.ref_name }} — ${RUN_URL}" \
            '{ text: $text }')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
